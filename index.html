<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Weird Good Radio</title>

  <link rel="stylesheet" href="receiver.css" />

  <!-- Google CAF receiver runtime (hosted by Google). -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <!-- Kept in the DOM so CAF has a media element for playback; our .tv overlay
       (opaque, higher z-index) fully hides its stock UI. -->
  <cast-media-player></cast-media-player>

  <!-- Our custom now-playing card. -->
  <div class="tv">
    <img class="logo" src="logo.png" alt="Weird Good Radio" />
    <div class="clock" id="clock"></div>

    <!-- Track + artist lockup, right. -->
    <div class="content">
      <div class="art" id="art"></div>
      <div class="meta">
        <div class="title"  id="title">Weird Good Radio</div>
        <div class="artist" id="artist"></div>
      </div>
    </div>

    <!-- Station icon + name + descriptor, bottom-left. -->
    <div class="station-box">
      <img class="station-icon" id="stationIcon" alt="" />
      <span class="station-name" id="station"></span>
      <span class="station-desc" id="stationDesc"></span>
    </div>

    <!-- LIVE, bottom-right. Matches the app's pill: a breathing aqua dot, the
         LIVE label, and a 3-bar stream-strength indicator (level set by JS). -->
    <div class="live">
      <span class="live-dot"></span>
      LIVE
      <span class="bars" id="bars" data-level="3">
        <span class="bar b1"></span>
        <span class="bar b2"></span>
        <span class="bar b3"></span>
      </span>
    </div>
  </div>

  <script src="receiver.js"></script>
</body>
</html>
