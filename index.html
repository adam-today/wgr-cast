<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Weird Good Radio</title>

  <link rel="stylesheet" href="receiver.css" />

  <!-- Google CAF receiver runtime (hosted by Google). -->
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
</head>
<body>
  <!-- Kept in the DOM so CAF has a media element for playback; our .tv overlay
       (opaque, higher z-index) fully hides its stock UI. -->
  <cast-media-player></cast-media-player>

  <!-- Our custom now-playing card. -->
  <div class="tv">
    <img class="logo" src="logo.png" alt="Weird Good Radio" />
    <div class="clock" id="clock"></div>

    <!-- Track + artist lockup, right. -->
    <div class="content">
      <div class="art" id="art"></div>
      <div class="meta">
        <div class="title"  id="title">Weird Good Radio</div>
        <div class="artist" id="artist"></div>
      </div>
    </div>

    <!-- Station icon + name + descriptor, bottom-left. -->
    <div class="station-box">
      <img class="station-icon" id="stationIcon" alt="" />
      <span class="station-name" id="station"></span>
      <span class="station-desc" id="stationDesc"></span>
    </div>

    <!-- LIVE, bottom-right. Animated broadcast-tower icon (matches the app's
         LiveTowerIcon): golden + magenta arcs pulse alternately. -->
    <div class="live">
      <svg class="live-icon" viewBox="0 0 40 26" aria-hidden="true">
        <path class="wave-outer" d="M8 20 Q1 13 8 6"  stroke="#D4A800" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path class="wave-outer" d="M32 20 Q39 13 32 6" stroke="#D4A800" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path class="wave-inner" d="M14 18 Q9 13 14 8"  stroke="#C41E6A" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path class="wave-inner" d="M26 18 Q31 13 26 8" stroke="#C41E6A" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M20 24 L17 16 L23 16 Z" fill="#FFFFFF" opacity="0.9"/>
        <circle cx="20" cy="13" r="3"   fill="#D4A800" opacity="0.95"/>
        <circle cx="20" cy="13" r="1.4" fill="#C41E6A"/>
        <circle cx="20" cy="13" r="0.5" fill="#002FA7"/>
      </svg>
      LIVE
    </div>
  </div>

  <script src="receiver.js"></script>
</body>
</html>
